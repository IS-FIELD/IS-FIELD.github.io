                      # other value (or no value) means no border will be displayed
        title: NVSpeech
        # icon: fas cloud
        link: https://arxiv.org/abs/2508.04195
        link_text: <i class="ai ai-arxiv"></i> An Integrated and Scalable Pipeline for Human-Like Speech Modeling with Paralinguistic Vocalizations



        description: |
          NVSpeech is an integrated pipeline for modeling human-like speech with paralinguistic vocalizations, bridging dataset construction, paralinguistic-aware ASR, and controllable TTS in a unified framework. In this project, I contributed to the recognition and synthesis side by developing timestamp-based filler and prosody feature extraction with WhisperX, FunAudio, and Whisper-timestamped, evaluating robustness across Emilia and EARS MM_TTS, generating over 100 text slices for each filler label to support synthesis and evaluation, and designing the project homepage to present the system architecture, demos, and datasets.
        # quote: >
        #   I contributed to advancing filler-word recognition and prosody-aware speech processing through feature engineering, dataset evaluation, and data preparation for synthesis.

        # description: |
        #   I proposed a timestamp-based filler and prosody feature extraction method leveraging WhisperX, FunAudio, and Whisper-timestamped to improve recognition accuracy. I further conducted cross-dataset evaluation on Emilia and EARS MM_TTS, validating robustness across English long-form audio and daily conversations. Additionally, I generated over 100 text slices per filler label to support TTS synthesis and evaluation, and designed the NVSpeech project homepage to present the system architecture, demos, and datasets.


      - layout: left
        border: weak  # Value of `weak` will display a weak border below this item. # Any
                      # other value (or no value) means no border will be displayed
        title: E-Price
        # icon: fas cloud
        link_text: Event-aware Long-term Electricity Price Forecasting via Large Language Models (Manuscript under review)
        description: |
          This project studies long-term electricity price forecasting through a hybrid framework that combines structured trend modeling with event-aware reasoning over news, aiming to capture both stable market fundamentals and high-impact external shocks. I contributed to the event-data and forecasting pipeline by building time- and keyword-conditioned news retrieval workflows for GDELT, automating the conversion from LLM-generated search plans to executable queries, collecting official yearly price-driver data and forecasts from EIA-oriented sources, improving retrieval robustness against malformed outputs, rate limits, and overlong queries, and supporting later benchmark experiments that connect event-aware news signals with long-horizon forecasting evaluation.

      - layout: left
        border: weak  # Value of `weak` will display a weak border below this item. # Any
                      # other value (or no value) means no border will be displayed
        title: SchenkerHnet
        # icon: fas cloud
        link_text: A Hierarchical and Theory-Guided Framework for Long-Range Symbolic Music (In Preparation)
        description: |
         SchenkerHnet is my independent research project on structure-aware symbolic music generation, which aims to bring Schenkerian hierarchy into AI models so that generated music reflects long-range tonal organization rather than only local token patterns. To build this system, I reconstructed large-scale classical piano corpora into theory-guided training data with harmonic, tonal, notes density, and structural annotations, redesigned the representation from coarse beat-level tokens to a cleaner tick-level JSONL format, and developed a hierarchical encoder–router–downsampler–main network–upsampler pipeline with Schenker-aware routing and long-memory modeling inspired by dynamic chunking network (Hnet) and Mamba. The project is currently being scaled to larger corpora for interpretable and structurally coherent long-form music generation.


  - title: Selected Projects # Title for the section
    layout: list # Type of content section (list/text)
    content:

      - layout: left
        border: weak  # Value of `weak` will display a weak border below this item. # Any
                      # other value (or no value) means no border will be displayed
        title: HyCoSeg
        # icon: fas cloud
        link: https://github.com/IS-FIELD/HyCoSeg
        link_text: '<i class="fab fa-github"></i> Manual and Deep Learning Hybrid Approach for COVID-19 Lung Lesion Segmentation'
  
        quote: >
          I led my team to present a hybrid method for segmenting lung lesions in COVID-19 CT scans. It combines classical image processing with deep learning to detect 3 common lesion types.

        description: |
          HyCoSeg is a hybrid pipeline that integrates classical image processing with deep learning for the segmentation of COVID-19 lung lesions in CT scans. The lung regions are first delineated with a 2D U-Net (LungMask) to constrain subsequent detection. Ground-glass opacities are segmented through Hounsfield Unit thresholding combined with morphological post-processing, while consolidation is identified using a coarse-to-fine deep model enhanced by Gabor texture filtering. Pleural effusion is extracted by boundary-aware density thresholding followed by connected-component analysis.

      - layout: left
        border: weak  # Value of `weak` will display a weak border below this item. # Any
                      # other value (or no value) means no border will be displayed
        title: FingerSense
        # icon: fas cloud
        link: https://github.com/IS-FIELD/FingerSense
        link_text: '<i class="fab fa-github"></i> A Piano Gesture Correction Pipeline with Motion Comparison and Real-Time Feedback'

        quote: >
          I developed FingerSense, a piano-practice analysis system that compares a student’s observed hand motion with a generated expert-standard motion and localizes technical errors into timestamped corrective feedback.

        description: |
          FingerSense takes one overhead piano-practice video and splits it into synchronized audio and video branches.  
          The system uses PianoMotion10M to generate a standard hand-motion sequence from the audio, and reconstructs the observed MANO-space gesture sequence from video with HaMeR.  
          It then aligns the two motion streams, computes frame-level losses, and packages the evidence into an LLM-ready report that can be converted into professional advice precise to the second.

      - layout: left
        border: weak  # Value of `weak` will display a weak border below this item. # Any
                      # other value (or no value) means no border will be displayed
        title: PaperHelper
