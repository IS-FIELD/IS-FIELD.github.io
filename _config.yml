about_content: | # this will include new lines to allow paragraphs

  Hi, I’m Yiheng Lu, a 3rd-year undergraduate at The Chinese University of Hong Kong, Shenzhen majoring in Electrical and Computer Engineering with a minor in Music, and I work at the intersection of generative AI and audio.

  I currently work as a Research Assistant in Amphion and NCEL, contributing to projects across speech modeling and smart-grid forecasting.
  
  My research interests span controllable generation (symbolic music generation, TTS/Text-to-Audio), paralinguistic vocalization modeling for more human-like speech, and multimodal alignment across audio–vision–motion for fine-grained feedback.



